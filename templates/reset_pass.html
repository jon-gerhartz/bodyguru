{% extends 'base.html' %}
{% block content %}
<div class="invite-split py-4">
	<section class="invite-panel">
		<p class="text-uppercase small mb-2">Account Recovery</p>
		<h1 class="page-title">Reset your password</h1>
		<p class="page-subtitle mb-0">Choose a new password to finish regaining access. This screen now uses the same dark shell and rounded surfaces as the rest of the app.</p>
	</section>
	<section class="invite-panel">
		<h2 class="h3 mb-3">Set new password</h2>
		<form action="{{ url_for('auth.submit_pass_reset') }}" method="post">
			<input type="hidden" name="url_var" value="{{ url_var }}">
			<div class="mb-3">
				<label class="form-label" for="password">Password</label>
				<input type="password" name="password" id="password" class="form-control" placeholder="New password" required>
			</div>
			<div class="mb-3">
				<label class="form-label" for="confirmPassword">Confirm password</label>
				<input type="password" name="confirm_password" id="confirmPassword" class="form-control" placeholder="Confirm password" required>
			</div>
			<div class="d-grid">
				<button class="btn btn-primary" type="submit">Save Password</button>
			</div>
		</form>
	</section>
</div>
{% endblock %}
